events {} # Required section

http {
    root /var/www/html;

    server {
        listen       9090;

        location / {
            index  index.html index.htm;
        }
    }

    server {
        listen       localhost:9091;

        location /about {
            index about.html index.html index.htm;
        }

        location /upload {
            methods POST;
        }
    }
}
