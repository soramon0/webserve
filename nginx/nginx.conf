events {} # Required section

http {
    root /var/www/html;

    server {
        listen       9090;

        location / {
            root /home/hanane/response/nginx/www;
            index  index.html index.htm;
            autoindex on;
            error_page 404 /error_pages/404.html;
        }
    }

    server {
        listen       localhost:9091;

        location /about {
            index about.html index.html index.htm;
        }

        location /upload {
            methods POST;
            client_max_body_size 1Mib;
        }

        location /script.py {
            methods POST;
            client_max_body_size 1Mib;
            cgi_pass .py /bin/python3;
        }
    }
}
