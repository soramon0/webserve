events {} # Required section

http {
    root   ./html;
    client_max_body_size 100000;

    server {
        types {
            avif image/avif;
            webp image/webp;
        }

        listen       127.0.0.1;
        #server_name  hellowrold;

        error_page 300 home.html;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }

        location /about {
            return 302 "/";
        }

        autoindex on;
        access_log /tmp/log.txt;
    }
}
